# ==========================================
# Production-Grade Coturn TURN Server Config
# ==========================================

# 1. Listening Ports & Interfaces
# -------------------------------
listening-port=3478
tls-listening-port=5349
# Listen on all wildcard interfaces
listening-ip=0.0.0.0

# 2. Relay Ports Configuration
# ----------------------------
# The range of UDP ports to use for relay sessions.
# Must match firewalls and docker mapped ports.
min-port=49160
max-port=49260

# 3. Secure REST API Dynamic Auth
# ------------------------------
# Enable long-term dynamic credentials verification (REST API auth).
# Avoids static usernames/passwords in config.
use-auth-secret
# The secret key for generating dynamic HMAC credentials.
# Note: In production, this must match the TURN_SECRET in your backend.
# The startup script will replace this placeholder with the actual environment variable.
static-auth-secret=__TURN_SECRET__

# 4. Realm Configuration
# ----------------------
# Realm defines the authentication domain.
# The startup script will replace this placeholder with the actual environment variable.
realm=__TURN_REALM__

# 5. Security & Protocol Options
# ------------------------------
# Enable WebRTC standard message integrity checks (highly recommended)
fingerprint
# Time-to-live for nonces (protects against replay attacks)
stale-nonce=600

# Strict security: deny loopback as relay target to prevent internal scan abuse
denied-peer-ip=127.0.0.1
no-multicast-peers

# 6. Performance & Scale Optimizations
# ------------------------------------
# Number of operating system worker threads. Recommended: CPU cores * 2.
# Coturn config uses 'threads' for worker thread counts.
threads=4
# Limit number of allocations per user (prevents resources abuse)
user-quota=100
total-quota=10000

# 7. Logging & Diagnostics
# ------------------------
# Log to standard output/error (crucial for Docker environments)
log-file=stdout
simple-log

# 8. Anti-Abuse & Rate-Limiting
# -----------------------------
# Limit allocation rate from a single IP to 10 allocations per second
# Coturn config uses 'allocation-lifetime' (in seconds)
allocation-lifetime=3600
