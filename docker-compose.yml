version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: ./infra/backend.Dockerfile
    ports:
      - "3001:3001"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/watchverse
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecretchangeinproduction
    depends_on:
      - mongodb
      - redis

  frontend:
    build:
      context: .
      dockerfile: ./infra/frontend.Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_WS_URL=ws://localhost:3001
    depends_on:
      - backend

volumes:
  mongodb_data:
